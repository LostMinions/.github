name: "Validate GH_TOKEN and Configure Git"
description: "Validates the provided GitHub token and sets up global git identity + credentials."

inputs:
  gh-token:
    description: "GitHub token to validate and configure"
    required: true

runs:
  using: "composite"
  steps:
    - name: 🔑 Validate GH_TOKEN
      shell: bash
      run: |
        echo "Validating GitHub token..."
        if curl -s -H "Authorization: Bearer ${{ inputs.gh-token }}" https://api.github.com/user | grep -q '"login"'; then
          echo "✅ Token OK"
        else
          echo "❌ Bad or expired GH_TOKEN"; exit 1
        fi

    - name: ⚙️ Configure Git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global credential.helper store
        echo "https://x-access-token:${{ inputs.gh-token }}@github.com" > ~/.git-credentials
