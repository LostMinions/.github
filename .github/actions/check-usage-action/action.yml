name: "Check GitHub Actions Usage"
description: "Performs a minimal checkout, checks org usage, and stops the job if over limit."
inputs:
  gh-token:
    description: "GitHub token with billing read access"
    required: true
  org-name:
    description: "Organization name"
    required: true
  limit:
    description: "Usage limit in minutes"
    default: "2000"
  margin:
    description: "Margin percentage"
    default: "5"

runs:
  using: "composite"
  steps:
    - name: 🔍 Check Actions usage
      id: usage
      shell: bash
      continue-on-error: true
      env:
        ORG_NAME: ${{ inputs.org-name }}
        GH_TOKEN: ${{ inputs.gh-token }}
      run: bash .github/scripts/check-org-gh-actions-usage.sh --limit ${{ inputs.limit }} --margin ${{ inputs.margin }}

    - name: ⏹ Stop job if near/over limit
      if: steps.usage.outcome != 'success'
      shell: bash
      run: |
        echo "⚠️ GitHub Actions usage too high — skipping job."
        exit 0
