name: "Cleanup Runner Workspace"
description: "Safely removes job checkouts and stale self-hosted data without breaking GitHub's post-job cleanup."

runs:
  using: "composite"
  steps:
    - name: 🧹 Cleanup workspace
      if: always()
      shell: bash
      run: |
        echo "🧹 Cleaning up workspace on $(hostname) (${RUNNER_OS})"

        # -------------------------------------------------------------------
        # Clean contents (not directory) to preserve GitHub internal structure
        # -------------------------------------------------------------------
        if [ -d "${{ github.workspace }}" ]; then
          echo "Clearing contents of ${{ github.workspace }} ..."
          find "${{ github.workspace }}" -mindepth 1 -exec rm -rf {} + 2>/dev/null || true
        fi

        # -------------------------------------------------------------------
        # Extra cleanup for self-hosted runners only
        # -------------------------------------------------------------------
        if [[ "$RUNNER_NAME" != "" && "$RUNNER_NAME" != "GitHub Actions" ]]; then
          echo "Clearing stale _work directories..."
          find /home/runner/actions-runner -type d -path "*/_work/*" \
            -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

          echo "Pruning old diagnostics (>7 days)..."
          find /home/runner/actions-runner -type d -name "_diag" \
            -mtime +7 -exec rm -rf {} + 2>/dev/null || true

          echo ""
          echo "📊 Post-cleanup disk usage summary:"
          sudo du -h --max-depth=1 /home/runner/actions-runner | sort -hr | head || true
        fi

        echo "Cleanup complete ✔️"
