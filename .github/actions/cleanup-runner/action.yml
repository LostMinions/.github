name: "Cleanup Runner Workspace"
description: "Safely removes job checkouts and stale self-hosted data without breaking GitHub's post-job cleanup."

runs:
  using: "composite"
  steps:
    - name: 🧹 Cleanup workspace
      if: always()
      shell: bash
      run: |
        echo "🧹 Cleaning up workspace on $(hostname) (${RUNNER_OS})"

        # -------------------------------------------------------------------
        # Clean only workspace contents, not the directory itself.
        #    Deleting the folder can break GitHub’s internal post-job Node calls.
        # -------------------------------------------------------------------
        if [ -d "${{ github.workspace }}" ]; then
          echo "Clearing contents of ${{ github.workspace }} ..."
          rm -rf "${{ github.workspace }}"/* "${{ github.workspace }}"/.[!.]* 2>/dev/null || true
        fi

        # -------------------------------------------------------------------
        # Extra safety for self-hosted runners only
        # -------------------------------------------------------------------
        if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
          echo "Clearing stale _work directories..."
          find /home/runner/actions-runners -type d -path "*/_work/*" \
            -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

          echo "Pruning old diagnostics (>7 days)..."
          find /home/runner/actions-runners -type d -name "_diag" \
            -mtime +7 -exec rm -rf {} + 2>/dev/null || true
        fi

        echo "Cleanup complete ✔️"
