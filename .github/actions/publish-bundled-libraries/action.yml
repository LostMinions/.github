name: 📦 Publish Bundled Libraries
description: Bundles latest .nupkg assets from submodules, zips them, and publishes a release only if bundle contents changed.

inputs:
  bump:
    description: "Version bump type (major, minor, patch)"
    default: "patch"
  gh-token:
    required: true

outputs:
  version: ${{ steps.export.outputs.version }}
  changed: ${{ steps.export.outputs.changed }}
  zip_path: ${{ steps.export.outputs.zip_path }}

runs:
  using: "composite"
  steps:
    # ------------------------------------------------------------
    # ♻️ Restore cached hash from previous run
    # ------------------------------------------------------------
    - name: ♻️ Restore bundle hash
      uses: actions/cache@v4
      with:
        path: .bundle-hash
        key: bundle-hash

    # ------------------------------------------------------------
    # 📦 Bundle library releases
    # ------------------------------------------------------------
    - name: 📦 Bundle Library Releases
      id: bundle
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        bash .github/scripts/bundle-library-releases.sh
        mkdir -p artifacts

        # Compute deterministic hash
        NEW_HASH=$(find artifacts -type f -exec sha256sum {} + | sort | sha256sum | awk '{print $1}')
        echo "hash=$NEW_HASH" >> "$GITHUB_OUTPUT"

        HASH_FILE=".bundle-hash"
        OLD_HASH=""
        if [ -f "$HASH_FILE" ]; then
          OLD_HASH=$(cat "$HASH_FILE")
          echo "Previous hash: $OLD_HASH"
        fi

        if [ "$NEW_HASH" == "$OLD_HASH" ]; then
          echo "No changes detected in bundled artifacts — skipping release."
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "CHANGED=false" >> $GITHUB_ENV
          exit 0
        fi

        echo "$NEW_HASH" > "$HASH_FILE"
        echo "changed=true" >> "$GITHUB_OUTPUT"
        echo "CHANGED=true" >> $GITHUB_ENV

        ZIP_PATH="LostMinions.Packages.zip"
        echo "Zipping to $ZIP_PATH"
        (cd artifacts && zip -r "../$ZIP_PATH" .)
        echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
        echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

    # ------------------------------------------------------------
    # 💾 Save updated hash to cache (only when changed)
    # ------------------------------------------------------------
    - name: 💾 Save new bundle hash
      if: env.CHANGED == 'true'
      uses: actions/cache@v4
      with:
        path: .bundle-hash
        key: bundle-hash

    # ------------------------------------------------------------
    # 🔢 Determine version (only when changed)
    # ------------------------------------------------------------
    - name: 🔢 Determine Version
      if: env.CHANGED == 'true'
      shell: bash
      run: |
        VERSION=$(bash .github/scripts/bump-version.sh)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    # ------------------------------------------------------------
    # 🏷️ Tag & Publish Release (only when changed)
    # ------------------------------------------------------------
    - name: 🏷️ Tag & Publish Release
      if: env.CHANGED == 'true'
      uses: ./.github/actions/publish-github-release
      with:
        version: ${{ env.VERSION }}
        gh-token: ${{ inputs.gh-token }}
        files: ${{ env.ZIP_PATH }}
        title: "📦 LostMinions.Packages"
        keep-latest: 10

    # ------------------------------------------------------------
    # 📤 Export outputs for workflows using this action
    # ------------------------------------------------------------
    - name: 📤 Export outputs
      id: export
      shell: bash
      run: |
        echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
        echo "changed=${CHANGED:-false}" >> "$GITHUB_OUTPUT"
        echo "zip_path=${ZIP_PATH:-}" >> "$GITHUB_OUTPUT"
