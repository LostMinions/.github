name: "Check GitHub Org Usage"
description: "Checks GitHub Actions minutes, Packages bandwidth, or other usage categories using CLI flags."

inputs:
  gh-token:
    description: "GitHub token with billing read access"
    required: true
  org-name:
    description: "Organization name"
    required: true
    default: "LostMinions"
  check-actions:
    description: "Run the Actions usage check"
    default: "false"
  check-packages-bandwidth:
    description: "Run the Packages bandwidth check"
    default: "false"
  actions-limit:
    description: "Actions usage limit (minutes)"
    default: "2000"
  packages-bandwidth-limit:
    description: "Packages bandwidth limit (GB)"
    default: "1.0"
  margin:
    description: "Margin percentage before stopping job"
    default: "0.5"

outputs:
  over_limit:
    description: "True if any usage is near or over the configured limit"
    value: ${{ steps.check.outputs.over_limit }}

runs:
  using: "composite"
  steps:
    - name: 🔍 Check Org Usage
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        ORG_NAME: ${{ inputs.org-name }}
        ACTIONS_LIMIT: ${{ inputs.actions-limit }}
        PKG_BANDWIDTH_LIMIT: ${{ inputs.packages-bandwidth-limit }}
        MARGIN: ${{ inputs.margin }}
      run: |
        echo "🧮 Running GitHub usage checks..."
        echo ""
        args=(--org "$ORG_NAME" --token "$GH_TOKEN" --margin "$MARGIN")

        [[ "${{ inputs.check-actions }}" == "true" ]] && args+=(--actions --actions-limit "$ACTIONS_LIMIT")
        [[ "${{ inputs.check-packages-bandwidth }}" == "true" ]] && args+=(--packages-bandwidth --packages-bandwidth-limit "$PKG_BANDWIDTH_LIMIT")

        # --- run script safely (never fail step) ---
        set +e
        bash .github/scripts/check-org-usage.sh "${args[@]}"
        result_code=$?
        set -e

        # --- detect result and emit output ---
        if [[ $result_code -ne 0 ]]; then
          echo "⚠️ One or more usage limits exceeded (requested checks)."
          echo "over_limit=true" >> "$GITHUB_OUTPUT"
        else
          echo "✅ Usage within safe limits."
          echo "over_limit=false" >> "$GITHUB_OUTPUT"
        fi

        # always exit 0 so the workflow continues cleanly
        exit 0
