name: "Check GitHub Org Usage"
description: "Checks GitHub Actions minutes or Packages bandwidth usage and outputs an over_limit flag."

inputs:
  gh-token:
    description: "GitHub token with billing read access"
    required: true
  org-name:
    description: "Organization name"
    required: true
    default: "LostMinions"
  mode:
    description: "Usage type to check: actions, packages, or both"
    required: false
    default: "actions"
  actions-limit:
    description: "Actions usage limit (minutes)"
    default: "2000"
  packages-bandwidth-limit:
    description: "Packages bandwidth limit (GB)"
    default: "1.0"
  margin:
    description: "Margin percentage before stopping job"
    default: "1"

outputs:
  over_limit:
    description: "True if usage is near or over the configured limit"
    value: ${{ steps.check.outputs.result == 'failure' }}

runs:
  using: "composite"
  steps:
    - name: 🔍 Check Org Usage
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        ORG_NAME: ${{ inputs.org-name }}
        MODE: ${{ inputs.mode }}
        ACTIONS_LIMIT: ${{ inputs.actions-limit }}
        PKG_BANDWIDTH_LIMIT: ${{ inputs.packages-bandwidth-limit }}
        MARGIN: ${{ inputs.margin }}
      run: |
        echo "🧮 Checking usage for '$MODE'..."
        case "$MODE" in
          actions)
            bash .github/scripts/check-org-usage.sh --actions --actions-limit "$ACTIONS_LIMIT" --margin "$MARGIN"
            ;;
          packages)
            bash .github/scripts/check-org-usage.sh --packages-bandwidth --packages-bandwidth-limit "$PKG_BANDWIDTH_LIMIT" --margin "$MARGIN"
            ;;
          both|all)
            bash .github/scripts/check-org-usage.sh --actions --packages-bandwidth \
              --actions-limit "$ACTIONS_LIMIT" --packages-bandwidth-limit "$PKG_BANDWIDTH_LIMIT" --margin "$MARGIN"
            ;;
          *)
            echo "❌ Invalid mode: $MODE (expected: actions, packages, or both)"
            exit 1
            ;;
        esac
