name: 🔢 Bump Version
description: Determines next semantic version.

inputs:
  bump:
    description: "Version bump type (major, minor, patch)"
    default: "patch"

outputs:
  version:
    value: ${{ steps.set.outputs.version }}

runs:
  using: "composite"
  steps:
    - id: set
      shell: bash
      run: |
        git fetch --tags --quiet || true

        echo "🔍 Tags in repo:"
        git tag --sort=-creatordate || echo "(none)"
        echo

        LATEST=$(git describe --tags --abbrev=0 2>/dev/null || git tag --sort=-creatordate | head -n1 || echo "")
        echo "📎 LATEST detected tag: '${LATEST}'"

        if [[ -z "$LATEST" ]]; then
          echo "🆕 No existing tags found. Starting at v1.0.0"
          VERSION="1.0.0"
        else
          BASE=${LATEST#v}
          BASE=${BASE:-$LATEST}
          echo "📦 Normalized base version: '${BASE}'"

          { IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"; } || true
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          bump="${INPUT_BUMP:-${{ inputs.bump }}}"
          echo "🔧 Bump type: '${bump}'"

          case "$bump" in
            major) ((MAJOR++)); MINOR=0; PATCH=0 ;;
            minor) ((MINOR++)); PATCH=0 ;;
            patch|*) ((PATCH++)) ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "✅ Final computed version: $VERSION"
