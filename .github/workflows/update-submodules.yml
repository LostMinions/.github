name: 🔄 Update Submodules

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/update-submodules.yml"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  submodule-update:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧮 Check GitHub Actions usage
        uses: ./.github/actions/check-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}

      - name: ⚙️ Validate and Configure Git
        uses: ./.github/actions/setup-git
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🔄 Update All Submodules
        id: update_submodules
        shell: bash
        run: |
          echo "🔄 Resetting and updating all submodules..."
          git submodule foreach --recursive 'git reset --hard'
          git submodule foreach --recursive 'git checkout master || true'
          git submodule foreach --recursive 'git pull origin master || true'

          echo "🧩 Committing updated submodules..."
          git add .
          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 Update submodules to latest ($NOW)"
            echo "⬆️ Pushing changes..."
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin HEAD:"${{ github.ref_name }}"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Trigger Compile Workflow
        if: steps.update_submodules.outputs.updated == 'true'
        uses: peter-evans/workflow-dispatch@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ github.repository }}
          workflow: "compile.yml"
          ref: ${{ github.ref_name }}
          inputs: {}
