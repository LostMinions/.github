name: 🔄 GitHub Org Sync

on:
  push:
    branches: [ main, master ]
    paths:
      # --- Workflow files
      - ".github/workflows/org-sync.yml"

      # --- Source sync files
      - "admin/*.sh"
      - "admin/*.json"

      # --- Template folders to watch
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/actions/**"
      - ".github/scripts/**"
      - ".github/workflows/**"

      # --- Governance documents
      - "CONTRIBUTING.md"
#      - "LICENSE"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
  workflow_call:
  workflow_dispatch:
    inputs:
      max_jobs:
        description: "Maximum concurrent repos to sync"
        required: false
        default: "4"

jobs:
  org-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧰 Minimal checkout for local actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          # org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      - name: 🚫 Skip if over limit
        if: steps.usage.outputs.result != 'success'
        run: |
          echo "⚠️ Usage near or over limit — skipping rest of job."
          exit 0

      - name: ⚙️ Validate and Configure Git
        uses: ./.github/actions/setup-git
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git gh jq perl
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token
          gh auth status -t

      - name: 🔮 Run Org Sync
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAX_JOBS: ${{ github.event.inputs.max_jobs || 4 }}
        run: |
          cd admin
          set -o pipefail
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} \;
          chmod +x *.sh
          start=$(date +%s)
          bash sync-core.sh | tee ../sync-output.txt
          end=$(date +%s)
          echo "⏱️ Sync duration: $(( (end - start) / 60 )) minutes"

      - name: 📦 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-logs
          path: admin/logs/
          retention-days: 30

      - name: 📄 Show Summary
        if: always()
        shell: bash
        run: |
          echo "### Sync Completed $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          shopt -s nullglob
          for log in admin/logs/*.log; do
            repo=$(basename "$log" .log)
            if grep -iq "failed" "$log"; then
              echo "| $repo | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $repo | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          shopt -u nullglob
