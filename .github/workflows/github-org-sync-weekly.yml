name: 🔄 GitHub Org Sync - Weekly

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/github-org-sync-weekly.yml"
  schedule:
    - cron: "0 1 * * 0"   # Sundays 01:00 UTC

jobs:
  trigger-update:
    timeout-minutes: 5
    uses: ./.github/workflows/github-org-sync.yml
    secrets: inherit
