name: 🔁 Update Submodules - Weekly

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/update-submodules-weekly.yml"
  schedule:
    - cron: "0 3 * * 0"   # Sundays 03:00 UTC

jobs:
  trigger-update:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🚀 Trigger submodule update
        uses: ./.github/workflows/update-submodules.yml
        secrets: inherit
