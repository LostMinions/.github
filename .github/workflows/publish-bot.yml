name: 🤖 Publish Discord Bot Build

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/publish-bot.yml"
  workflow_call:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (major, minor, patch)"
        required: false
        default: "patch"

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧰 Minimal checkout for local actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          # org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "true"

      - name: 🚫 Skip if over limit
        if: steps.usage.outputs.result != 'success'
        run: |
          echo "⚠️ Usage near or over limit — skipping rest of job."
          exit 0

      - name: ⚙️ Validate and Configure Git
        uses: ./.github/actions/setup-git
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🤖 Publish Discord Bot Release
        uses: ./.github/actions/build-dotnet-release
        with:
          project_filter: "*Bot.csproj"
          bump: ${{ github.event.inputs.bump }}
          runtime: "win-x64"
          gh-token: ${{ secrets.GH_TOKEN }}
