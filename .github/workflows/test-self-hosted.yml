name: 🧪 Test Self-Hosted Runner

on:
  push:
    branches: [ main, master ]
    paths:
      # --- Workflow files
      - ".github/workflows/test-self-hosted.yml"
  workflow_dispatch:  # run manually from the Actions tab

jobs:
  ping:
    runs-on: self-hosted
    steps:
      - run: echo "Hello from $(hostname)"

  test:
    name: 🧩 Runner Diagnostics
    runs-on: self-hosted
    timeout-minutes: 2

    steps:
      - name: 🏁 Identify Runner
        run: |
          echo "✅ Running on self-hosted runner"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner labels: $RUNNER_TRACKING_ID"
          echo "OS: $(uname -a)"

      - name: 🧰 Check Installed Tools
        run: |
          echo "🔍 Checking common tool versions..."
          which git && git --version
          which jq && jq --version
          which gh && gh --version || echo "⚠️ GitHub CLI not installed"
          which dotnet && dotnet --info || echo "ℹ️ .NET not installed"
          which node && node -v || echo "ℹ️ Node.js not installed"
          which python3 && python3 --version || echo "ℹ️ Python not installed"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          check-actions: "false"
          check-packages-bandwidth: "false"

      - name: 🧱 Test Build Script
        run: |
          echo "🧪 Simulating typical job..."
          mkdir -p output
          echo "Hello from $(hostname) at $(date)" > output/test.txt
          ls -la output

      - name: ⚙️ Setup .NET and NuGet
        uses: ./.github/actions/setup-dotnet-nuget
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          owner: ${{ github.repository_owner }}

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-hosted-test
          path: output/test.txt

      # - name: 🧹 Cleanup Runner
      #   if: always()
      #   uses: ./.github/actions/cleanup-runner
