name: 📦 Publish Package

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/publish.yml"
  workflow_call:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (major, minor, patch)"
        required: false
        default: "patch"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧰 Minimal checkout for local actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: 🧮 Check GitHub Actions usage
        uses: ./.github/actions/check-usage-action
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}

      - name: 🧮 Check GitHub Packages usage
        uses: ./.github/actions/check-usage-package
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}

      - name: ⚙️ Validate and Configure Git
        uses: ./.github/actions/setup-git
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 📦 Publish .NET Package
        uses: ./.github/actions/build-dotnet-package
        with:
          bump: ${{ github.event.inputs.bump }}
          gh-token: ${{ secrets.GH_TOKEN }}
